# ==============================================================================
# FILE        : profiles.conf
# ==============================================================================
# Synopsis    : Reusable socat address-option profiles for --socat-opts.
# Description : Each value below is a ready-to-use argument for the --socat-opts
#               flag on the listen and batch modes. These are copy-paste
#               references — the tool does NOT read this file. Every value uses
#               only the characters the option validator permits (alphanumeric
#               and = , . : - / _) and passes validation as written.
#
#                 socat-manager listen --port 8080 --socat-opts "reuseaddr"
#                 socat-manager batch  --ports 8080,8443 \
#                     --socat-opts "keepalive,keepidle=30,keepcnt=3,keepintvl=10"
#
# Notes       : Options are appended to the socat listener address. Consult
#               `man socat` and `man socat-address` for the full option set and
#               exact semantics on your platform.
# Version     : 1.0.2
# ==============================================================================

# Address reuse — allow rebinding a port still in TIME_WAIT.
reuse = reuseaddr

# TCP keepalive — detect and drop dead peers on long-lived connections.
keepalive = keepalive,keepidle=30,keepcnt=3,keepintvl=10

# Large socket buffers — higher throughput for bulk transfers (bytes).
large-buffers = rcvbuf=262144,sndbuf=262144

# Low latency — disable Nagle's algorithm for small, latency-sensitive packets.
low-latency = nodelay

# Source restriction — accept connections only from a source subnet.
# This is a socat-native access control (see also tcp-wrappers below).
# Prefer the dedicated --allow <CIDR> flag, which validates the range and
# handles IPv6 bracketing; this raw form remains available via --socat-opts.
source-restrict = range=10.0.0.0/8

# TCP wrappers — enforce host access via /etc/hosts.allow and /etc/hosts.deny
# using the daemon name "socat". Prefer the dedicated --tcpwrap [NAME] flag.
tcp-wrappers = tcpwrap=socat
