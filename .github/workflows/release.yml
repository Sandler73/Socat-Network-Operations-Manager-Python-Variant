# ==============================================================================
# FILE        : .github/workflows/release.yml
# ==============================================================================
# Synopsis    : Release workflow for Socat Network Operations Manager (Python)
# Description : On a pushed version tag (v*), builds the source distribution and
#               wheel with the standard build frontend and publishes a GitHub
#               release with the built artifacts attached.
# Notes       : - Triggers: push of a tag matching v* (for example v1.0.2).
#               - Declares least-privilege permissions (contents: write) — the
#                 minimum needed to create a release and upload assets.
# Version     : 1.0.2
# ==============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

# Creating a release and uploading assets requires write access to repository
# contents; nothing else is needed.
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
          generate_release_notes: true
