# ==============================================================================
# FILE        : .github/workflows/test.yml
# ==============================================================================
# Synopsis    : CI test workflow for Socat Network Operations Manager (Python)
# Description : Runs the full unit and integration suite on GitHub-hosted Ubuntu
#               runners across Python 3.12 and 3.13, and on Debian container
#               images that pin the same Python versions. Every job installs
#               socat and the optional tools, runs pytest with coverage, and the
#               Ubuntu 24.04 / Python 3.12 job uploads coverage.xml.
# Notes       : - The project is checked out at the repository root; the package
#                 lives under src/ (resolved via PYTHONPATH).
#               - Container jobs use the official python:* images, which pin the
#                 interpreter and ship git, so checkout and the run steps work
#                 without installing a newer Python by hand.
#               - Triggers: push to main/develop and pull requests to main.
#               - Least-privilege permissions; superseded runs are cancelled.
# Version     : 1.0.2
# ==============================================================================

name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: src

jobs:
  # GitHub-hosted Ubuntu runners with a pinned Python from actions/setup-python.
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 22.04 (Python 3.12)
            os: ubuntu-22.04
            python: "3.12"
          - name: Ubuntu 24.04 (Python 3.12)
            os: ubuntu-24.04
            python: "3.12"
          - name: Ubuntu 24.04 (Python 3.13)
            os: ubuntu-24.04
            python: "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq socat openssl iproute2 util-linux

      - name: Install test dependencies
        run: python -m pip install --upgrade pytest pytest-cov

      - name: Verify tooling
        run: |
          socat -V | head -2
          python --version

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short

      - name: Run full suite with coverage
        run: |
          python -m pytest tests/ --cov=socat_manager \
            --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: ${{ matrix.name == 'Ubuntu 24.04 (Python 3.12)' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Smoke test
        run: |
          python -c "import socat_manager; print(f'v{socat_manager.__version__}')"
          python -m socat_manager --version
          python -m socat_manager --help

  # Debian container images that pin the interpreter, validating a non-Ubuntu
  # userland on both supported Python versions.
  test-containers:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian 12 (Python 3.12)
            image: python:3.12-bookworm
          - name: Debian 12 (Python 3.13)
            image: python:3.13-bookworm
          - name: Debian 11 (Python 3.12)
            image: python:3.12-bullseye

    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq socat openssl iproute2 util-linux git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: python -m pip install --upgrade pytest pytest-cov

      - name: Verify tooling
        run: |
          socat -V | head -2
          python --version

      - name: Run full suite
        run: python -m pytest tests/ -v --tb=short

      - name: Smoke test
        run: |
          python -c "import socat_manager; print(f'v{socat_manager.__version__}')"
          python -m socat_manager --version
