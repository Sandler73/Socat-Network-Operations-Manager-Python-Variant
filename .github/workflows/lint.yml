# ==============================================================================
# FILE        : .github/workflows/lint.yml
# ==============================================================================
# Synopsis    : Static quality gate for Socat Network Operations Manager (Python)
# Description : Runs the ruff linter, a ruff-based security scan (flake8-bandit
#               S-rules), and a best-effort mypy type check on a single fast
#               runner. Mirrors the `lint`, `security`, and `type-check`
#               Makefile targets so local and CI results agree.
# Notes       : - Runs at the repository root, where src/ and tests/ live.
#               - S603/S607 are excluded by design (argument-list subprocess
#                 calls that resolve tools via PATH); all other S-rules apply.
#               - The mypy step is advisory (continue-on-error).
#               - Triggers: push to main/develop and pull requests to main.
# Version     : 1.0.2
# ==============================================================================

name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, security, and types
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: python -m pip install --upgrade ruff mypy

      - name: Ruff lint
        run: ruff check src/ tests/ --select E,W,F,I --ignore E501

      - name: Security scan (ruff flake8-bandit)
        run: ruff check src/ --select S --ignore S603,S607

      - name: Type check (non-blocking)
        continue-on-error: true
        run: mypy src/socat_manager
